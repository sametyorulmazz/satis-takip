<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Satış Takip">
<meta name="theme-color" content="#5B6AF0">
<title>Satış Takip</title>
<link rel="manifest" id="manifestLink">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F2FF;color:#1a1a2e}
.app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.header{background:linear-gradient(135deg,#5B6AF0,#7C3AED);padding:env(safe-area-inset-top,14px) 16px 14px;padding-top:calc(env(safe-area-inset-top,0px) + 14px);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.3px}
.header .sub{font-size:12px;color:rgba(255,255,255,0.75)}
.pages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding:14px;padding-bottom:16px}
.page.active{display:block}
.nav{display:flex;background:#fff;border-top:1px solid #e8eaf6;flex-shrink:0;padding:6px 0 calc(env(safe-area-inset-bottom,0px) + 2px)}
.nav button{flex:1;padding:5px 4px 3px;border:none;background:none;cursor:pointer;font-size:10px;color:#9094B0;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;transition:color 0.15s;font-weight:500}
.nav button.active{color:#5B6AF0}
.nav button svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav button.active svg{stroke-width:2.2}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(91,106,240,0.07)}
.sec{font-size:11px;font-weight:700;color:#9094B0;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:12px}
label{font-size:13px;color:#6B7280;display:block;margin-bottom:5px;margin-top:14px;font-weight:500}
label:first-of-type{margin-top:0}
input,select{width:100%;padding:11px 14px;border:1.5px solid #E8EAF6;border-radius:12px;font-size:15px;background:#F8F9FF;color:#1a1a2e;font-family:inherit;appearance:none;-webkit-appearance:none;transition:border-color 0.15s}
input:focus,select:focus{outline:none;border-color:#5B6AF0;background:#fff}
input::placeholder{color:#B0B4CC}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px;border-radius:12px;border:1.5px solid #E8EAF6;background:#fff;color:#1a1a2e;font-size:15px;cursor:pointer;font-family:inherit;font-weight:600;transition:all 0.15s}
.btn:active{opacity:0.75;transform:scale(0.98)}
.btn.primary{background:linear-gradient(135deg,#5B6AF0,#7C3AED);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(91,106,240,0.3)}
.btn.full{width:100%}
.btn.sm{padding:8px 14px;font-size:13px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.metric{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(91,106,240,0.07)}
.metric .lbl{font-size:11px;color:#9094B0;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.metric .val{font-size:20px;font-weight:700;margin-top:4px;color:#1a1a2e;letter-spacing:-0.5px}
.metric.accent{background:linear-gradient(135deg,#5B6AF0,#7C3AED)}
.metric.accent .lbl{color:rgba(255,255,255,0.75)}
.metric.accent .val{color:#fff}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #F0F2FF}
.list-item:last-child{border-bottom:none;padding-bottom:0}
.list-item:first-child{padding-top:0}
.empty{text-align:center;padding:40px 16px;color:#B0B4CC;font-size:14px}
.empty .ico{font-size:38px;display:block;margin-bottom:10px;opacity:0.5}
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.date-row input{flex:1}
.del-btn{background:none;border:none;cursor:pointer;color:#B0B4CC;padding:6px;border-radius:8px;flex-shrink:0;font-size:17px;line-height:1}
.del-btn:active{color:#EF4444}
.product-row{background:#F8F9FF;border-radius:12px;padding:12px;margin-bottom:8px;border:1.5px solid #E8EAF6}
.product-row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.product-row-header span{font-size:12px;font-weight:700;color:#5B6AF0;text-transform:uppercase;letter-spacing:0.05em}
.pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.order-total{background:linear-gradient(135deg,#EEF0FF,#F3EEFF);border-radius:12px;padding:14px;display:flex;justify-content:space-between;align-items:center;margin-top:6px;border:1.5px solid #DDE0FF}
.order-total .lbl{font-size:13px;color:#5B6AF0;font-weight:600}
.order-total .val{font-size:20px;font-weight:700;color:#5B6AF0}
.badge-stock{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-ok{background:#ECFDF5;color:#059669}
.badge-low{background:#FEF9C3;color:#D97706}
.badge-zero{background:#FEF2F2;color:#EF4444}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 80px);left:50%;transform:translateX(-50%);background:rgba(26,26,46,0.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
.toast.err{background:rgba(239,68,68,0.92)}
@media(prefers-color-scheme:dark){
  body{background:#13131f;color:#f0f0ff}
  .header{background:linear-gradient(135deg,#3d4db8,#5a2db0)}
  .card,.metric:not(.accent),.nav{background:#1e1e30}
  .nav{border-top-color:#2a2a40}
  input,select{background:#252538;border-color:#2e2e48;color:#f0f0ff}
  input:focus,select:focus{background:#2a2a40;border-color:#5B6AF0}
  input::placeholder{color:#5a5a78}
  .btn:not(.primary){background:#1e1e30;border-color:#2e2e48;color:#f0f0ff}
  .product-row{background:#252538;border-color:#2e2e48}
  .list-item{border-bottom-color:#252538}
  .order-total{background:linear-gradient(135deg,#1e2048,#221a3a);border-color:#3a3a60}
  .metric .val{color:#f0f0ff}
  .card,.metric{box-shadow:none}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1 id="pageTitle">Özet</h1>
    <span class="sub" id="headerDate"></span>
  </div>
  <div class="pages">
    <div id="pageHome" class="page active">
      <div class="metrics" id="homeMetrics"></div>
      <div class="card">
        <div class="sec">Son siparişler</div>
        <div id="recentOrders"></div>
      </div>
    </div>
    <div id="pageProducts" class="page">
      <div class="card">
        <div class="sec">Yeni ürün ekle</div>
        <label>Ürün adı</label>
        <input id="pName" placeholder="Örn: Tişört, Pantolon…" autocomplete="off"/>
        <label>Fiyat (₺)</label>
        <input id="pPrice" type="number" min="0" placeholder="0,00" inputmode="decimal"/>
        <label>Başlangıç stok</label>
        <input id="pStock" type="number" min="0" placeholder="0" inputmode="numeric"/>
        <button class="btn primary full" style="margin-top:14px" onclick="addProduct()">+ Ürün Ekle</button>
      </div>
      <div class="card">
        <div class="sec">Ürün listesi</div>
        <div id="productList"></div>
      </div>
    </div>
    <div id="pageOrder" class="page">
      <div class="card">
        <div class="sec">Sipariş bilgileri</div>
        <label>Müşteri adı</label>
        <input id="oCustomer" placeholder="İsteğe bağlı" autocomplete="off"/>
        <label>Tarih</label>
        <input id="oDate" type="date"/>
        <label>Not</label>
        <input id="oNote" placeholder="İsteğe bağlı" autocomplete="off"/>
      </div>
      <div class="card">
        <div class="sec">Ürünler</div>
        <div id="orderLines"></div>
        <button class="btn full" style="margin-top:8px" onclick="addOrderLine()">+ Ürün Ekle</button>
      </div>
      <div class="card">
        <div class="order-total">
          <span class="lbl">Sipariş toplamı</span>
          <span class="val" id="orderTotalDisplay">0,00 ₺</span>
        </div>
        <button class="btn primary full" style="margin-top:12px" onclick="saveOrder()">✓ Siparişi Kaydet</button>
      </div>
    </div>
    <div id="pageReport" class="page">
      <div class="date-row">
        <input id="rDate" type="date" onchange="renderReport()"/>
        <button class="btn sm primary" onclick="sharePDF()">↑ Paylaş</button>
      </div>
      <div id="reportContent"></div>
    </div>
  </div>
  <nav class="nav">
    <button class="active" onclick="showPage('Home',this)">
      <svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/><path d="M3 12v9h18v-9"/></svg>Özet
    </button>
    <button onclick="showPage('Products',this)">
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="17"/><line x1="9.5" y1="14.5" x2="14.5" y2="14.5"/></svg>Ürünler
    </button>
    <button onclick="showPage('Order',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Sipariş
    </button>
    <button onclick="showPage('Report',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>Ekstre
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
let products=JSON.parse(localStorage.getItem('st_products')||'[]');
let orders=JSON.parse(localStorage.getItem('st_orders')||'[]');
let lineCount=0;

function save(){localStorage.setItem('st_products',JSON.stringify(products));localStorage.setItem('st_orders',JSON.stringify(orders))}
function showToast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' err':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400)}
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}.${m}.${y}`}
function fmtMoney(n){return Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺'}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page'+name).classList.add('active');
  btn.classList.add('active');
  document.querySelector('.pages').scrollTop=0;
  const titles={Home:'Özet',Products:'Ürünler',Order:'Sipariş Girişi',Report:'Günlük Ekstre'};
  document.getElementById('pageTitle').textContent=titles[name];
  if(name==='Home')renderHome();
  if(name==='Products')renderProducts();
  if(name==='Order')initOrderForm();
  if(name==='Report')renderReport();
}

function renderHome(){
  const ts=today();
  const to=orders.filter(o=>o.date===ts);
  const tr=to.reduce((s,o)=>s+o.lines.reduce((ls,l)=>ls+l.qty*l.price,0),0);
  const allR=orders.reduce((s,o)=>s+o.lines.reduce((ls,l)=>ls+l.qty*l.price,0),0);
  document.getElementById('homeMetrics').innerHTML=`
    <div class="metric accent"><div class="lbl">Bugünkü ciro</div><div class="val">${fmtMoney(tr)}</div></div>
    <div class="metric"><div class="lbl">Bugünkü sipariş</div><div class="val">${to.length}</div></div>
    <div class="metric"><div class="lbl">Toplam ciro</div><div class="val" style="font-size:17px">${fmtMoney(allR)}</div></div>
    <div class="metric"><div class="lbl">Toplam sipariş</div><div class="val">${orders.length}</div></div>`;
  const rec=[...orders].sort((a,b)=>b.id-a.id).slice(0,5);
  const el=document.getElementById('recentOrders');
  if(!rec.length){el.innerHTML='<div class="empty"><span class="ico">🛒</span>Henüz sipariş yok</div>';return}
  el.innerHTML=rec.map(o=>{
    const tot=o.lines.reduce((s,l)=>s+l.qty*l.price,0);
    const names=o.lines.map(l=>l.product).join(', ');
    return`<div class="list-item"><div style="min-width:0;flex:1;margin-right:8px"><div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${names}</div><div style="font-size:12px;color:#9094B0">${o.customer||'—'} · ${fmtDate(o.date)}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:700;color:#5B6AF0">${fmtMoney(tot)}</div><div style="font-size:12px;color:#9094B0">${o.lines.length} kalem</div></div></div>`;
  }).join('')
}

function stockBadge(s){
  if(s<=0)return`<span class="badge-stock badge-zero">Stok yok</span>`;
  if(s<=3)return`<span class="badge-stock badge-low">Stok: ${s}</span>`;
  return`<span class="badge-stock badge-ok">Stok: ${s}</span>`;
}

function renderProducts(){
  const el=document.getElementById('productList');
  if(!products.length){el.innerHTML='<div class="empty"><span class="ico">📦</span>Ürün eklenmemiş</div>';return}
  el.innerHTML=products.map((p,i)=>`
    <div class="list-item">
      <div><div style="font-size:15px;font-weight:600">${p.name}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:3px"><span style="font-size:13px;color:#5B6AF0;font-weight:600">${fmtMoney(p.price)}</span>${stockBadge(p.stock)}</div></div>
      <button class="del-btn" onclick="deleteProduct(${i})">🗑</button>
    </div>`).join('')
}

function addProduct(){
  const name=document.getElementById('pName').value.trim();
  const price=parseFloat(document.getElementById('pPrice').value)||0;
  const stock=parseInt(document.getElementById('pStock').value)||0;
  if(!name){showToast('Ürün adı gerekli',true);return}
  products.push({name,price,stock,id:Date.now()});save();
  document.getElementById('pName').value='';document.getElementById('pPrice').value='';document.getElementById('pStock').value='';
  renderProducts();showToast('Ürün eklendi ✓')
}

function deleteProduct(i){
  if(!confirm('Bu ürünü silmek istediğinize emin misiniz?'))return;
  products.splice(i,1);save();renderProducts();showToast('Ürün silindi')
}

function productOptions(sel){
  return'<option value="">— Ürün seç —</option>'+products.map(p=>`<option value="${p.name}" data-price="${p.price}"${p.name===sel?' selected':''}>${p.name} (${fmtMoney(p.price)})</option>`).join('')
}

function initOrderForm(){
  lineCount=0;
  document.getElementById('oCustomer').value='';
  document.getElementById('oNote').value='';
  document.getElementById('oDate').value=today();
  document.getElementById('orderLines').innerHTML='';
  addOrderLine();updateOrderTotal()
}

function addOrderLine(){
  lineCount++;const id=lineCount;
  const div=document.createElement('div');
  div.className='product-row';div.id='line_'+id;
  div.innerHTML=`<div class="product-row-header"><span>Ürün ${id}</span><button class="del-btn" onclick="removeLine(${id})">✕</button></div>
    <select onchange="lineChanged(this,${id})">${productOptions('')}</select>
    <div class="pr-grid" style="margin-top:8px">
      <div><label style="margin-top:0">Adet</label><input type="number" min="1" value="1" id="lQty_${id}" inputmode="numeric" oninput="updateOrderTotal()"/></div>
      <div><label style="margin-top:0">Fiyat (₺)</label><input type="number" min="0" placeholder="0,00" id="lPrice_${id}" inputmode="decimal" oninput="updateOrderTotal()"/></div>
    </div>`;
  document.getElementById('orderLines').appendChild(div);updateOrderTotal()
}

function lineChanged(sel,id){
  const opt=sel.options[sel.selectedIndex];
  if(opt&&opt.dataset.price)document.getElementById('lPrice_'+id).value=opt.dataset.price;
  updateOrderTotal()
}

function removeLine(id){
  document.getElementById('line_'+id)?.remove();
  updateOrderTotal();renumberLines()
}

function renumberLines(){
  document.querySelectorAll('.product-row').forEach((r,i)=>{
    const s=r.querySelector('.product-row-header span');if(s)s.textContent='Ürün '+(i+1)
  })
}

function updateOrderTotal(){
  let t=0;
  document.querySelectorAll('.product-row').forEach(row=>{
    const id=row.id.replace('line_','');
    t+=(parseFloat(document.getElementById('lQty_'+id)?.value)||0)*(parseFloat(document.getElementById('lPrice_'+id)?.value)||0)
  });
  document.getElementById('orderTotalDisplay').textContent=fmtMoney(t)
}

function saveOrder(){
  const customer=document.getElementById('oCustomer').value.trim();
  const date=document.getElementById('oDate').value||today();
  const note=document.getElementById('oNote').value.trim();
  const lines=[];let err=false;
  document.querySelectorAll('.product-row').forEach(row=>{
    if(err)return;
    const id=row.id.replace('line_','');
    const product=row.querySelector('select').value;
    const qty=parseInt(document.getElementById('lQty_'+id)?.value)||0;
    const price=parseFloat(document.getElementById('lPrice_'+id)?.value)||0;
    if(!product){showToast('Tüm kalemlerde ürün seçin',true);err=true;return}
    if(qty<=0){showToast('Adet sıfırdan büyük olmalı',true);err=true;return}
    if(price<=0){showToast('Fiyat sıfırdan büyük olmalı',true);err=true;return}
    lines.push({product,qty,price})
  });
  if(err||!lines.length)return;
  for(const l of lines){const p=products.find(x=>x.name===l.product);if(p&&p.stock<l.qty){showToast(l.product+': yetersiz stok!',true);return}}
  for(const l of lines){const p=products.find(x=>x.name===l.product);if(p)p.stock-=l.qty}
  orders.push({id:Date.now(),customer,date,note,time:new Date().toTimeString().slice(0,5),lines});
  save();showToast('Sipariş kaydedildi ✓');initOrderForm()
}

function renderReport(){
  const d=document.getElementById('rDate').value;
  if(!d){document.getElementById('reportContent').innerHTML='<div class="card"><div class="empty"><span class="ico">📅</span>Tarih seçiniz</div></div>';return}
  const dayO=orders.filter(o=>o.date===d);
  const total=dayO.reduce((s,o)=>s+o.lines.reduce((ls,l)=>ls+l.qty*l.price,0),0);
  const byP={};
  dayO.forEach(o=>o.lines.forEach(l=>{if(!byP[l.product])byP[l.product]={qty:0,total:0};byP[l.product].qty+=l.qty;byP[l.product].total+=l.qty*l.price}));
  let html=`<div class="card"><div class="metrics" style="margin-bottom:0">
    <div class="metric accent"><div class="lbl">Toplam ciro</div><div class="val">${fmtMoney(total)}</div></div>
    <div class="metric"><div class="lbl">Sipariş sayısı</div><div class="val">${dayO.length}</div></div></div>`;
  if(Object.keys(byP).length){
    html+=`<div class="sec" style="margin-top:16px">Ürün bazında özet</div>`;
    html+=Object.entries(byP).map(([n,v])=>`<div class="list-item"><div style="font-size:14px;font-weight:500">${n}</div><div style="text-align:right"><div style="font-size:14px;font-weight:700;color:#5B6AF0">${fmtMoney(v.total)}</div><div style="font-size:12px;color:#9094B0">${v.qty} adet</div></div></div>`).join('')
  }
  html+='</div>';
  if(dayO.length){
    html+=`<div class="card"><div class="sec">Sipariş detayı</div>`;
    html+=dayO.map((o,oi)=>{
      const ot=o.lines.reduce((s,l)=>s+l.qty*l.price,0);
      return`<div style="padding:12px 0;border-bottom:1px solid #F0F2FF">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div><div style="font-size:15px;font-weight:700">${o.customer||'İsimsiz'}</div><div style="font-size:12px;color:#9094B0">${o.time||''} · ${o.lines.length} kalem</div></div>
          <div style="display:flex;align-items:center;gap:6px"><span style="font-size:15px;font-weight:700;color:#5B6AF0">${fmtMoney(ot)}</span><button class="del-btn" onclick="deleteOrder(${oi})">🗑</button></div>
        </div>
        ${o.lines.map(l=>`<div style="display:flex;justify-content:space-between;padding:5px 0 5px 12px;border-bottom:0.5px solid #F0F2FF"><span style="font-size:13px;color:#444">${l.product}</span><span style="font-size:12px;color:#9094B0">${l.qty} × ${fmtMoney(l.price)} = <b style="color:#5B6AF0">${fmtMoney(l.qty*l.price)}</b></span></div>`).join('')}
        ${o.note?`<div style="font-size:12px;color:#9094B0;margin-top:6px;padding-left:12px">📝 ${o.note}</div>`:''}
      </div>`
    }).join('');
    html+='</div>'
  } else {
    html+='<div class="card"><div class="empty"><span class="ico">📭</span>Bu tarihte sipariş yok</div></div>'
  }
  document.getElementById('reportContent').innerHTML=html
}

function deleteOrder(di){
  const d=document.getElementById('rDate').value;
  const dayO=orders.filter(o=>o.date===d);
  const order=dayO[di];
  if(!order||!confirm('Bu siparişi silmek istiyor musunuz?'))return;
  order.lines.forEach(l=>{const p=products.find(x=>x.name===l.product);if(p)p.stock+=l.qty});
  orders.splice(orders.indexOf(order),1);save();renderReport();showToast('Sipariş silindi')
}

async function sharePDF(){
  const d=document.getElementById('rDate').value;
  if(!d){showToast('Önce tarih seçin',true);return}
  if(typeof window.jspdf==='undefined'){showToast('PDF kütüphanesi yükleniyor…');return}

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
  const dayO=orders.filter(o=>o.date===d);
  const total=dayO.reduce((s,o)=>s+o.lines.reduce((ls,l)=>ls+l.qty*l.price,0),0);

  // Renk paleti
  const purple=[91,106,240];
  const dark=[26,26,46];
  const gray=[144,148,176];
  const lightBg=[240,242,255];

  // Başlık bandı
  doc.setFillColor(...purple);
  doc.rect(0,0,210,28,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text('GUNLUK SATIS EKSTRESI',14,12);
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text(fmtDate(d)+'   |   '+dayO.length+' siparis   |   Toplam: '+fmtMoney(total),14,22);

  let y=36;

  // Ürün özeti
  if(dayO.length){
    const byP={};
    dayO.forEach(o=>o.lines.forEach(l=>{if(!byP[l.product])byP[l.product]={qty:0,total:0};byP[l.product].qty+=l.qty;byP[l.product].total+=l.qty*l.price}));
    doc.setFillColor(...lightBg);
    doc.rect(14,y,182,8,'F');
    doc.setTextColor(...purple);doc.setFontSize(9);doc.setFont('helvetica','bold');
    doc.text('URUN',16,y+5.5);
    doc.text('ADET',120,y+5.5);
    doc.text('TOPLAM',160,y+5.5);
    y+=10;
    Object.entries(byP).forEach(([name,v])=>{
      doc.setTextColor(...dark);doc.setFontSize(9);doc.setFont('helvetica','normal');
      doc.text(name.substring(0,35),16,y+4);
      doc.text(String(v.qty),120,y+4);
      doc.setFont('helvetica','bold');doc.setTextColor(...purple);
      doc.text(fmtMoney(v.total),160,y+4);
      y+=8;
      doc.setDrawColor(220,222,255);doc.line(14,y-1,196,y-1);
    });
    y+=4;
  }

  // Sipariş detayları
  dayO.forEach((o,oi)=>{
    if(y>260){doc.addPage();y=14}
    const ot=o.lines.reduce((s,l)=>s+l.qty*l.price,0);
    doc.setFillColor(...purple);
    doc.rect(14,y,182,7,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');
    const cust=(o.customer||'Isimsiz')+' — '+o.time;
    doc.text(cust,16,y+5);
    doc.text(fmtMoney(ot),175,y+5,{align:'right'});
    y+=9;
    o.lines.forEach(l=>{
      if(y>270){doc.addPage();y=14}
      doc.setTextColor(...dark);doc.setFontSize(9);doc.setFont('helvetica','normal');
      doc.text(l.product.substring(0,30),20,y+4);
      doc.setTextColor(...gray);
      doc.text(l.qty+' x '+fmtMoney(l.price),100,y+4);
      doc.setTextColor(...purple);doc.setFont('helvetica','bold');
      doc.text(fmtMoney(l.qty*l.price),175,y+4,{align:'right'});
      y+=7;
      doc.setDrawColor(235,237,255);doc.line(14,y-1,196,y-1);
    });
    if(o.note){doc.setTextColor(...gray);doc.setFontSize(8);doc.setFont('helvetica','italic');doc.text('Not: '+o.note,20,y+3);y+=6}
    y+=3;
  });

  // Alt toplam
  y+=2;
  doc.setFillColor(...purple);doc.rect(14,y,182,10,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(11);doc.setFont('helvetica','bold');
  doc.text('GENEL TOPLAM',16,y+7);
  doc.text(fmtMoney(total),175,y+7,{align:'right'});

  // PDF blob → paylaşım
  const pdfBlob=doc.output('blob');
  const fileName='ekstre_'+d+'.pdf';
  const file=new File([pdfBlob],fileName,{type:'application/pdf'});

  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    try{
      await navigator.share({title:'Satış Ekstresi '+fmtDate(d),files:[file]});
    }catch(e){
      if(e.name!=='AbortError')fallbackDownload(pdfBlob,fileName);
    }
  } else {
    fallbackDownload(pdfBlob,fileName);
  }
}

function fallbackDownload(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;a.click();
  URL.revokeObjectURL(url);
  showToast('PDF indirildi')
}
